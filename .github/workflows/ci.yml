name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify package contents
        run: npm pack --dry-run 2>&1 | tee /dev/stderr | grep -q 'commands/sd/enable.md'

      - name: Test install
        run: |
          ./bin/cc-slightly-dangerous install
          test -f "$HOME/.claude/commands/sd/enable.md"
          test -f "$HOME/.claude/commands/sd/enable-with-git.md"
          test -f "$HOME/.claude/commands/sd/disable.md"
          diff commands/sd/ "$HOME/.claude/commands/sd/"

      - name: Test uninstall
        run: |
          ./bin/cc-slightly-dangerous uninstall
          test ! -d "$HOME/.claude/commands/sd"
